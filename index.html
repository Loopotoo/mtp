<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MTG Collection</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css" />

<style>
body{font-family:Arial;margin:20px;background:#111;color:#eee}
.grid{display:grid;grid-template-columns:repeat(auto-fill,200px);gap:15px}
.card{background:#222;padding:10px;border-radius:6px;text-align:center}
.card img{width:100%;border-radius:4px}
.name{margin-top:6px;font-size:14px}
</style>

</head>

<body>

<h2>MTG Cards</h2>

<div class="grid" id="gallery"></div>

<script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>

<script>

fetch("cards.csv")
.then(r=>r.text())
.then(text=>{

const rows = text.trim().split("\n").slice(1);

rows.forEach(r=>{

let [name,id,front,back] = r.split(",");

let card = document.createElement("div");
card.className="card";

card.innerHTML=`
<a href="images/${front}" class="glightbox${id}" data-gallery="g${id}" data-title="${name} (${id}) - Front">
<img src="images/${front}">
</a>

<a href="images/${back}" class="glightbox${id}" data-gallery="g${id}" data-title="${name} (${id}) - Back"></a>

<div class="name">${name} (${id})</div>
`;

document.getElementById("gallery").appendChild(card);

});

GLightbox();

});

</script>

</body>
</html>
